<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- K letter with integrated play triangle -->
  <g transform="translate(256,256)">
    <!-- Left vertical bar of K -->
    <rect x="-120" y="-130" width="55" height="260" rx="12" fill="white"/>
    <!-- Upper diagonal of K -->
    <polygon points="-65,-10 60,-130 120,-130 -20,-10" fill="white"/>
    <!-- Play triangle (lower part of K, forms the arrow/play shape) -->
    <polygon points="-65,10 -65,130 80,70" fill="white"/>
  </g>
</svg>
